<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>25.1班操行排位赛</title></head>
<body style="font-family:sans-serif;max-width:800px;margin:auto;padding:20px;background:#0a192f;color:#e8e8e8;">
<h1 style="color:#ffd700;">🏆 25.1班操行排位赛</h1>
<div id="status">加载中...</div>
<ul id="studentList"></ul>
<script>
fetch("/api/scores").then(function(r){return r.json()}).then(function(d){
  var html = "";
  if(d.students && d.students.length) {
    html = "<p>共" + d.students.length + "名学生</p>";
    d.students.sort(function(a,b){return (d.scores[b]||15)-(d.scores[a]||15);});
    d.students.forEach(function(n,i){
      html += "<div style="padding:8px;margin:4px;background:rgba(255,255,255,0.07);border-radius:6px;">"
        + (i+1) + ". " + n + " - " + (d.scores[n]||15) + "分</div>";
    });
    document.getElementById("status").textContent = "加载成功!";
  } else {
    document.getElementById("status").textContent = "没有学生数据";
  }
  document.getElementById("studentList").innerHTML = html;
}).catch(function(e){
  document.getElementById("status").textContent = "加载失败: " + e.message;
  document.getElementById("studentList").innerHTML = "<li style='color:red'>" + e.message + "</li>";
});
</script>
</body>
</html>
